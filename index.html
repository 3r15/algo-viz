<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>algo-viz — 알고리즘 시각화</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f14; --panel:#121a21; --panel2:#0e151b; --line:#233039;
    --ink:#c9d6df; --muted:#63747f; --dim:#3a464f;
    --ampA:#e9a94b; --cyanB:#46c7e6; --green:#6fbf73; --warn:#d9863f;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    font-size:14px; line-height:1.5;
    background-image:radial-gradient(circle at 12% -5%, #10202a 0%, transparent 45%),
                     radial-gradient(circle at 92% 0%, #1a1410 0%, transparent 42%);
    background-attachment:fixed;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:22px 18px 60px}
  a{color:var(--cyanB); text-decoration:none}
  a:hover{text-decoration:underline}
  code{font-family:var(--mono); background:var(--panel2); border:1px solid var(--line);
    padding:1px 5px; border-radius:4px; font-size:11.5px; color:#aebac3}

  /* ---- header (공용) ---- */
  header{display:flex; flex-wrap:wrap; gap:18px 26px; align-items:flex-end;
    border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:20px}
  .brand h1{font-family:var(--mono); font-weight:600; font-size:19px; letter-spacing:-0.3px;
    margin:0 0 4px}
  .brand .sub{color:var(--muted); font-size:12.5px; max-width:60ch}
  .brand .back{font-family:var(--mono); font-size:12px; color:var(--muted); display:inline-block;
    margin-bottom:8px}
  .brand .back:hover{color:var(--cyanB)}

  .controls{margin-left:auto; display:flex; flex-direction:column; gap:9px; align-items:flex-end}
  .inputrow{display:flex; gap:8px; align-items:center}
  .inputrow label{font-family:var(--mono); font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--muted)}
  #arr{font-family:var(--mono); background:var(--panel2); border:1px solid var(--line);
    color:var(--ink); padding:7px 10px; border-radius:5px; width:200px; font-size:13px}
  #arr:focus{outline:none; border-color:var(--cyanB)}
  .btn{font-family:var(--mono); font-size:12px; background:var(--panel); color:var(--ink);
    border:1px solid var(--line); padding:7px 12px; border-radius:5px; cursor:pointer;
    transition:border-color .15s, background .15s}
  .btn:hover{border-color:var(--dim); background:#16202a}
  .btn.primary{border-color:#3c5460; color:#dff4fb}
  .btn.primary:hover{border-color:var(--cyanB)}
  .note{font-family:var(--mono); font-size:11px; color:var(--warn); min-height:14px}

  /* ================= 카탈로그(메인) ================= */
  .search-row{display:flex; gap:10px; align-items:center; margin-bottom:16px}
  #search{flex:1; font-family:var(--mono); font-size:14px; background:var(--panel2);
    border:1px solid var(--line); color:var(--ink); padding:10px 13px; border-radius:7px}
  #search:focus{outline:none; border-color:var(--cyanB)}
  .count{font-family:var(--mono); font-size:12px; color:var(--muted); white-space:nowrap}

  .facets{display:flex; flex-wrap:wrap; gap:14px 22px; margin-bottom:20px;
    padding-bottom:18px; border-bottom:1px solid var(--line)}
  .facet-group{display:flex; flex-direction:column; gap:7px}
  .facet-group .flabel{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--muted)}
  .chips{display:flex; flex-wrap:wrap; gap:6px}
  .chip{font-family:var(--mono); font-size:11.5px; color:var(--muted); cursor:pointer;
    background:var(--panel2); border:1px solid var(--line); padding:4px 10px; border-radius:20px;
    transition:all .12s}
  .chip:hover{border-color:var(--dim); color:var(--ink)}
  .chip.on{color:#0a0f14; background:var(--cyanB); border-color:var(--cyanB); font-weight:500}

  .cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(268px,1fr)); gap:14px}
  .card{display:flex; flex-direction:column; gap:9px; text-align:left; cursor:pointer;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:15px 16px;
    color:inherit; font:inherit; transition:border-color .14s, transform .14s, background .14s}
  .card:hover{border-color:var(--cyanB); transform:translateY(-2px); background:#141d25}
  .card:focus-visible{outline:2px solid var(--cyanB); outline-offset:2px}
  .card h3{margin:0; font-family:var(--mono); font-size:15px; font-weight:600; color:#eaf2f7}
  .card .card-id{font-family:var(--mono); font-size:11px; color:var(--dim)}
  .card .card-sum{font-size:12.5px; color:var(--muted); line-height:1.5}
  .card .card-meta{display:flex; flex-wrap:wrap; gap:6px; margin-top:auto; padding-top:4px}
  .badge{font-family:var(--mono); font-size:10.5px; padding:2px 7px; border-radius:4px;
    border:1px solid var(--line); color:var(--muted)}
  .badge.cat{color:var(--cyanB); border-color:color-mix(in srgb,var(--cyanB) 35%,var(--line))}
  .badge.diff{color:var(--ampA); border-color:color-mix(in srgb,var(--ampA) 35%,var(--line))}
  .badge.cpx{color:#aebac3}
  .badge.verified{color:var(--green); border-color:color-mix(in srgb,var(--green) 40%,var(--line))}
  .empty{font-family:var(--mono); font-size:13px; color:var(--muted); padding:40px 0; text-align:center}

  /* ================= 알고리즘 플레이어 ================= */
  .player{--acc:var(--ampA)}
  .algo-sub{font-family:var(--mono); color:var(--cyanB); font-size:12.5px; margin-top:2px}
  .algo-sub b{color:var(--ampA)}
  .chan{border:1px solid var(--line); border-radius:9px; background:var(--panel);
    overflow:hidden; display:flex; flex-direction:column}

  /* code panel */
  .code{font-family:var(--mono); font-size:12.5px; padding:10px 0; background:var(--panel2);
    border-bottom:1px solid var(--line)}
  .cl{display:flex; padding:1px 14px; white-space:pre; color:#9fb0bb; transition:background .1s}
  .cl .ln{color:var(--dim); width:22px; text-align:right; margin-right:14px; user-select:none;
    flex:none}
  .cl.on{background:color-mix(in srgb, var(--acc) 14%, transparent);
    box-shadow:inset 3px 0 0 var(--acc); color:#eaf2f7}

  /* viz */
  .viz{padding:16px 16px 10px; min-height:186px; display:flex; align-items:flex-end;
    justify-content:center; gap:10px; position:relative;
    background:
      linear-gradient(var(--line) 1px, transparent 1px) 0 0/100% 44px,
      var(--panel)}
  .bar-col{display:flex; flex-direction:column; align-items:center; gap:5px; width:40px}
  .bar-val{font-family:var(--mono); font-size:12px; color:var(--muted); transition:color .15s}
  .bar{width:30px; border-radius:3px 3px 0 0;
    background:color-mix(in srgb, var(--acc) 26%, #1b2831);
    border:1px solid color-mix(in srgb, var(--acc) 30%, var(--line));
    transition:height .28s cubic-bezier(.4,0,.2,1), background .15s, border-color .15s}
  .bar-ix{font-family:var(--mono); font-size:10px; color:var(--dim)}
  .bar-col.cmp .bar{background:#2b3a44; border-color:#c9d6df; box-shadow:0 0 0 1px #c9d6df inset}
  .bar-col.cmp .bar-val{color:#eaf2f7}
  .bar-col.swp .bar{background:var(--acc); border-color:var(--acc);
    box-shadow:0 0 12px 0 color-mix(in srgb,var(--acc) 60%, transparent)}
  .bar-col.swp .bar-val{color:var(--acc)}
  .bar-col.sorted .bar{background:color-mix(in srgb,var(--green) 22%, #16221a);
    border-color:color-mix(in srgb,var(--green) 45%,var(--line))}
  .bar-col.sorted .bar-val{color:var(--green)}

  /* readout */
  .readout{font-family:var(--mono); font-size:11.5px; padding:10px 14px; display:flex;
    flex-wrap:wrap; gap:4px 16px; border-top:1px solid var(--line); color:var(--muted)}
  .readout b{color:var(--ink); font-weight:500}
  .readout .op{color:var(--acc)}
  .readout .exp{flex-basis:100%; color:#aebac3}

  /* transport */
  .transport{display:flex; align-items:center; gap:14px; margin:16px 0 4px;
    border:1px solid var(--line); border-radius:9px; background:var(--panel); padding:11px 14px}
  .tbtns{display:flex; gap:6px}
  .tbtn{font-family:var(--mono); font-size:13px; width:38px; height:34px; display:grid;
    place-items:center; background:var(--panel2); border:1px solid var(--line); border-radius:6px;
    color:var(--ink); cursor:pointer; transition:border-color .15s,background .15s}
  .tbtn:hover{border-color:var(--dim); background:#16202a}
  .tbtn.play{width:44px; color:#dff4fb; border-color:#3c5460}
  #scrub{flex:1; accent-color:var(--cyanB); cursor:pointer}
  .counter{font-family:var(--mono); font-size:12px; color:var(--muted); white-space:nowrap;
    min-width:78px; text-align:right}
  .speed{display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px;
    color:var(--muted)}
  .speed input{width:78px; accent-color:var(--ampA)}

  @media (max-width:820px){
    .controls{margin-left:0; align-items:stretch; width:100%}
    header{align-items:flex-start}
    #arr{width:100%}
  }
  @media (prefers-reduced-motion:reduce){ .bar,.card{transition:none} }
</style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
</div>
<script type="module" src="app/main.js"></script>
</body>
</html>
