<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>algo-viz — 알고리즘 시각화</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* 회색 단색 팔레트 — 그라데이션/네온 없음 */
    --bg:#1a1a1a; --panel:#232323; --panel2:#1c1c1c; --line:#353535;
    --ink:#ececec; --muted:#949494; --dim:#5e5e5e;
    --acc:#d2d2d2;      /* 밝은 회색 — UI 강조 / 활성 라인 / swap */
    --cmp:#767676;      /* 중간 회색 — compare */
    --sorted:#829c82;   /* 절제된 무광 초록 — 정렬 확정(유일한 색 신호) */
    --warn:#c89a5c;     /* 무광 앰버 — 오류 안내 문구 전용 */
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --sans:'Space Grotesk', system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    font-size:15px; line-height:1.55; letter-spacing:.1px;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:26px 20px 64px}
  a{color:var(--ink); text-decoration:none}
  a:hover{color:#fff; text-decoration:underline}
  code{font-family:var(--mono); background:var(--panel2); border:1px solid var(--line);
    padding:1px 5px; border-radius:4px; font-size:12px; color:#bdbdbd}

  /* ---- header (공용) ---- */
  header{display:flex; flex-wrap:wrap; gap:18px 26px; align-items:flex-end;
    border-bottom:1px solid var(--line); padding-bottom:20px; margin-bottom:24px}
  .brand h1{font-family:var(--sans); font-weight:600; font-size:30px; letter-spacing:-0.6px;
    margin:0 0 6px; color:#f6f6f6}
  .brand .sub{color:var(--muted); font-size:13px; max-width:62ch}
  .brand .back{font-family:var(--mono); font-size:12px; color:var(--muted); display:inline-block;
    margin-bottom:10px; letter-spacing:.02em}
  .brand .back:hover{color:var(--ink)}

  .controls{margin-left:auto; display:flex; flex-direction:column; gap:9px; align-items:flex-end}
  .inputrow{display:flex; gap:8px; align-items:center}
  .inputrow label{font-family:var(--mono); font-size:11px; letter-spacing:.09em;
    text-transform:uppercase; color:var(--muted)}
  #arr{font-family:var(--mono); background:var(--panel2); border:1px solid var(--line);
    color:var(--ink); padding:8px 11px; border-radius:5px; width:200px; font-size:13px}
  #arr:focus{outline:none; border-color:var(--acc)}
  .btn{font-family:var(--mono); font-size:12px; background:var(--panel); color:var(--ink);
    border:1px solid var(--line); padding:8px 13px; border-radius:5px; cursor:pointer;
    transition:border-color .14s, background .14s}
  .btn:hover{border-color:var(--dim); background:#2a2a2a}
  .btn.primary{border-color:#5a5a5a; color:#fff}
  .btn.primary:hover{border-color:var(--acc); background:#2e2e2e}
  .note{font-family:var(--mono); font-size:11px; color:var(--warn); min-height:14px}

  /* ================= 카탈로그(메인) ================= */
  .search-row{display:flex; gap:12px; align-items:center; margin-bottom:18px}
  #search{flex:1; font-family:var(--sans); font-size:15px; background:var(--panel2);
    border:1px solid var(--line); color:var(--ink); padding:11px 14px; border-radius:7px}
  #search::placeholder{color:var(--dim)}
  #search:focus{outline:none; border-color:var(--acc)}
  .count{font-family:var(--mono); font-size:12px; color:var(--muted); white-space:nowrap}

  .facets{display:flex; flex-wrap:wrap; gap:16px 24px; margin-bottom:22px;
    padding-bottom:20px; border-bottom:1px solid var(--line)}
  .facet-group{display:flex; flex-direction:column; gap:8px}
  .facet-group .flabel{font-family:var(--mono); font-size:10.5px; letter-spacing:.11em;
    text-transform:uppercase; color:var(--muted)}
  .chips{display:flex; flex-wrap:wrap; gap:6px}
  .chip{font-family:var(--mono); font-size:11.5px; color:var(--muted); cursor:pointer;
    background:var(--panel2); border:1px solid var(--line); padding:5px 11px; border-radius:5px;
    transition:border-color .12s, color .12s, background .12s}
  .chip:hover{border-color:var(--dim); color:var(--ink)}
  .chip.on{color:#1a1a1a; background:var(--acc); border-color:var(--acc); font-weight:600}

  .cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(276px,1fr)); gap:14px}
  .card{display:flex; flex-direction:column; gap:9px; text-align:left; cursor:pointer;
    background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px 17px;
    color:inherit; font:inherit; transition:border-color .14s, transform .14s, background .14s}
  .card:hover{border-color:var(--acc); transform:translateY(-2px); background:#282828}
  .card:focus-visible{outline:2px solid var(--acc); outline-offset:2px}
  .card h3{margin:0; font-family:var(--sans); font-size:19px; font-weight:600; color:#f4f4f4;
    letter-spacing:-.2px}
  .card .card-id{font-family:var(--mono); font-size:11px; color:var(--dim)}
  .card .card-sum{font-size:13px; color:var(--muted); line-height:1.5}
  .card .card-meta{display:flex; flex-wrap:wrap; gap:6px; margin-top:auto; padding-top:4px}
  .badge{font-family:var(--mono); font-size:10.5px; padding:2px 7px; border-radius:4px;
    border:1px solid var(--line); color:var(--muted)}
  .badge.cat{color:var(--ink); border-color:#454545}
  .badge.diff{color:var(--muted)}
  .badge.cpx{color:#bdbdbd}
  .badge.verified{color:var(--sorted); border-color:color-mix(in srgb,var(--sorted) 45%,var(--line))}
  .empty{font-family:var(--mono); font-size:13px; color:var(--muted); padding:44px 0; text-align:center}

  .badge.soon{color:var(--warn); border-color:color-mix(in srgb,var(--warn) 40%,var(--line))}
  .card.placeholder{opacity:.64}
  .card.placeholder:hover{opacity:1}

  /* ================= 알고리즘 페이지 ================= */
  .algo-head{border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:18px}
  .algo-head .back{font-family:var(--mono); font-size:12px; color:var(--muted); display:inline-block;
    margin-bottom:10px}
  .algo-head .back:hover{color:var(--ink)}
  .algo-title{font-family:var(--sans); font-weight:600; font-size:30px; letter-spacing:-.6px;
    margin:0 0 12px; color:#f6f6f6}
  /* 상단: 분류 · 시간 · 공간 (딱 3개) */
  .topinfo{display:flex; flex-wrap:wrap; gap:8px}
  .topinfo .badge{font-size:12px; padding:4px 11px; color:var(--ink)}
  button.badge{background:transparent; cursor:pointer; font-family:var(--mono);
    transition:border-color .12s, color .12s, background .12s}
  button.badge:hover{border-color:var(--acc); background:var(--panel2)}

  /* 툴바: 입력 + 조작 패널 — 코드 바로 위(아래 viz 높이 변화에 안 밀림) */
  .toolbar{display:flex; flex-direction:column; gap:11px; margin-bottom:14px}
  .toolbar .inputrow{flex-wrap:wrap}
  .transport{display:flex; align-items:center; gap:14px;
    border:1px solid var(--line); border-radius:8px; background:var(--panel); padding:12px 15px}
  .tbtns{display:flex; gap:6px}
  .tbtn{font-family:var(--mono); font-size:13px; width:38px; height:34px; display:grid;
    place-items:center; background:var(--panel2); border:1px solid var(--line); border-radius:6px;
    color:var(--ink); cursor:pointer; transition:border-color .14s,background .14s}
  .tbtn:hover{border-color:var(--dim); background:#2a2a2a}
  .tbtn.play{width:44px; color:#fff; border-color:#5a5a5a}
  .scrub{flex:1; accent-color:var(--acc); cursor:pointer}
  .counter{font-family:var(--mono); font-size:12px; color:var(--muted); white-space:nowrap;
    min-width:80px; text-align:right}
  .speed{display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px;
    color:var(--muted)}
  .speed input{width:80px; accent-color:var(--acc)}

  .chan{border:1px solid var(--line); border-radius:8px; background:var(--panel);
    overflow:hidden; display:flex; flex-direction:column}

  /* code panel — 4칸 들여쓰기 + 신택스 하이라이팅 */
  .code{font-family:var(--mono); font-size:13px; padding:11px 0; background:var(--panel2);
    border-bottom:1px solid var(--line); overflow-x:auto}
  .cl{display:flex; padding:1.5px 15px; white-space:pre; color:#a6a6a6; transition:background .1s}
  .cl .ln{color:var(--dim); width:24px; text-align:right; margin-right:15px; user-select:none;
    flex:none}
  .cl.on{background:rgba(255,255,255,.05); box-shadow:inset 3px 0 0 var(--acc); color:#ffffff}
  .tok-kw{color:#c98fb0} .tok-type{color:#7fb3a3} .tok-num{color:#cb9a6b}
  .tok-str{color:#9fb069} .tok-com{color:#6f6f6f; font-style:italic}
  .tok-fn{color:#d4cf9c} .tok-punct{color:#8f8f8f}

  /* viz — 고정 높이(막대 크기 변화로 레이아웃이 흔들리지 않게) */
  .viz{padding:18px 16px 12px; height:210px; display:flex; align-items:flex-end;
    justify-content:center; gap:11px; background:var(--panel)}
  .bar-col{display:flex; flex-direction:column; align-items:center; gap:5px; width:40px}
  .bar-val{font-family:var(--mono); font-size:12.5px; color:var(--muted); transition:color .14s}
  .bar{width:30px; border-radius:3px 3px 0 0; background:#3a3a3a; border:1px solid #4a4a4a;
    transition:height .28s cubic-bezier(.4,0,.2,1), background .14s, border-color .14s}
  .bar-ix{font-family:var(--mono); font-size:10px; color:var(--dim)}
  .bar-col.cmp .bar{background:#4e4e4e; border-color:var(--cmp)}
  .bar-col.cmp .bar-val{color:var(--ink)}
  .bar-col.swp .bar{background:var(--acc); border-color:var(--acc)}
  .bar-col.swp .bar-val{color:var(--acc)}
  .bar-col.sorted .bar{background:#2f3a2f; border-color:var(--sorted)}
  .bar-col.sorted .bar-val{color:var(--sorted)}

  /* graph 렌더러(정점 상태: 0 미방문·1 큐대기·2 방문중·3 완료) */
  .viz.graph{align-items:center}
  .graphviz{display:flex; flex-direction:column; align-items:center; gap:12px; width:100%}
  .graph-svg{width:100%; max-width:460px; height:150px}
  .gedge{stroke:#3a3a3a; stroke-width:.7}
  .gnode circle{fill:#2a2a2a; stroke:#4a4a4a; stroke-width:.8;
    transition:fill .2s, stroke .2s, stroke-width .2s}
  .gnode text{fill:var(--muted); font-family:var(--mono); font-size:5px;
    font-weight:500; transition:fill .2s}
  .gnode.s1 circle{stroke:var(--acc); stroke-width:1.4}     /* 큐 대기 */
  .gnode.s1 text{fill:var(--ink)}
  .gnode.s2 circle{fill:var(--acc); stroke:var(--acc)}      /* 방문 중 */
  .gnode.s2 text{fill:#1a1a1a}
  .gnode.s3 circle{fill:#2f3a2f; stroke:var(--sorted)}      /* 완료 */
  .gnode.s3 text{fill:var(--sorted)}
  .graph-queue{font-family:var(--mono); font-size:12.5px; color:var(--muted); letter-spacing:.04em}

  /* readout — 높이 예약(설명 줄바꿈으로 아래 태그가 덜 밀리게) */
  .readout{font-family:var(--mono); font-size:11.5px; padding:11px 15px; display:flex;
    flex-wrap:wrap; gap:4px 16px; border-top:1px solid var(--line); color:var(--muted); min-height:42px}
  .readout b{color:var(--ink); font-weight:500}
  .readout .op{color:var(--ink)}
  .readout .exp{flex-basis:100%; color:#bdbdbd}

  /* 하단: 태그(클릭 → 해당 태그로 검색) */
  .tags{display:flex; flex-wrap:wrap; align-items:center; gap:7px; margin-top:18px;
    padding-top:15px; border-top:1px solid var(--line)}
  .tags-label{font-family:var(--mono); font-size:10.5px; letter-spacing:.11em;
    text-transform:uppercase; color:var(--muted); margin-right:4px}
  .tag{font-family:var(--mono); font-size:11.5px; color:var(--muted); cursor:pointer;
    background:var(--panel2); border:1px solid var(--line); padding:4px 10px 4px 8px; border-radius:5px;
    transition:border-color .12s, color .12s, background .12s}
  .tag::before{content:'#'; color:var(--dim); margin-right:2px}
  .tag:hover{border-color:var(--acc); color:var(--ink); background:#282828}

  /* 준비 중(placeholder) 페이지 */
  .coming-soon{display:flex; flex-direction:column; align-items:flex-start; gap:12px;
    background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:34px 26px}
  .cs-badge{font-family:var(--mono); font-size:12px; color:var(--warn);
    border:1px solid color-mix(in srgb,var(--warn) 40%,var(--line)); padding:4px 11px; border-radius:5px}
  .cs-sum{margin:0; color:var(--ink); font-size:14px; max-width:60ch}
  .cs-note{margin:0; color:var(--muted); font-size:12.5px}

  @media (max-width:820px){
    header{align-items:flex-start}
    .brand h1,.algo-title{font-size:25px}
    .toolbar .inputrow{gap:6px}
    #arr{flex:1; min-width:120px}
  }
  @media (prefers-reduced-motion:reduce){ .bar,.card{transition:none} }
</style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
</div>
<script type="module" src="app/main.js"></script>
</body>
</html>
